<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2C5F2E" />
    <title>Listing Tracker — Mountain Town Living</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
      input, button, select, textarea { font-family: inherit; }
      input { border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; background: #fff; }
      input:focus { border-color: #2C5F2E; }
      button { font-family: inherit; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f5;
        --color-background-tertiary: #efefef;
        --color-text-primary: #111;
        --color-text-secondary: #666;
        --color-border-tertiary: rgba(0,0,0,0.1);
        --color-border-secondary: rgba(0,0,0,0.2);
        --color-border-primary: rgba(0,0,0,0.3);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
